name: Create and publish npm package
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to publish (for example: v1.0.0-beta18)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'coliff/popover-css-inspector'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Resolve package metadata
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag_name="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.ref }}" ]; then
            tag_name="${{ inputs.ref }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag_name="${{ github.ref_name }}"
          else
            echo "workflow_dispatch must be run from a version tag ref or provided with the 'ref' input."
            exit 1
          fi

          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Check tag matches package version
        run: |
          expected_tag="v${{ steps.package.outputs.version }}"
          actual_tag="${{ steps.release.outputs.tag }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag '$actual_tag' does not match package version '${{ steps.package.outputs.version }}'."
            echo "Expected tag: '$expected_tag'"
            exit 1
          fi

      - name: Check whether version is already published
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "Package ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published. Skipping publish."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run build
        run: npm run build

      - name: Publish npm Package Publicly
        if: steps.published.outputs.already_published != 'true'
        run: npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deprecate previously published versions
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          package_name="${{ steps.package.outputs.name }}"
          package_version="${{ steps.package.outputs.version }}"
          deprecation_message="This version has been deprecated. Please use ${package_name}@${package_version}."

          npm deprecate "${package_name}@${package_version}" "" || true

          versions_json=$(npm view "$package_name" versions --json)
          previous_versions=$(node -e '
            const versions = JSON.parse(process.argv[1]);
            const currentVersion = process.argv[2];
            const list = Array.isArray(versions) ? versions : [versions];
            console.log(list.filter((version) => version && version !== currentVersion).join("\n"));
          ' "$versions_json" "$package_version")

          if [ -z "$previous_versions" ]; then
            echo "No previous versions to deprecate."
            exit 0
          fi

          while IFS= read -r version; do
            if [ -n "$version" ]; then
              npm deprecate "${package_name}@${version}" "$deprecation_message"
            fi
          done <<EOF
          $previous_versions
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
